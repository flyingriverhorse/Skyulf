# © 2025 Murat Unsal — Skyulf Project
#
# Frontend test/build pipeline: lint, type-check, unit tests, bundle-size
# budget, and Playwright e2e for the React/TypeScript ML Canvas app. Kept
# separate from the Python workflows (pr_check.yml, backend-tests.yml,
# skyulf-core-tests.yml) so frontend-only PRs aren't gated on Python checks
# and vice versa.

name: Frontend Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-gate:
    name: Frontend gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/ml-canvas/package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci --silent --no-audit --no-fund
          echo "::endgroup::"
          echo "## 🎨 Frontend gate" >> "$GITHUB_STEP_SUMMARY"
        working-directory: frontend/ml-canvas

      - name: Lint (ESLint)
        run: bash ../../.github/scripts/run_check.sh "ESLint" npm run lint
        working-directory: frontend/ml-canvas

      - name: Type check (tsc)
        run: bash ../../.github/scripts/run_check.sh "tsc --noEmit" npx tsc --project tsconfig.json --noEmit
        working-directory: frontend/ml-canvas

      - name: Version sync check (pyproject.toml vs package.json)
        run: bash ../../.github/scripts/run_check.sh "Version sync check" npm run check-version
        working-directory: frontend/ml-canvas

  frontend-build:
    needs: frontend-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/ml-canvas/package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci --silent --no-audit --no-fund
          echo "::endgroup::"
          echo "## 🏗️ Frontend build" >> "$GITHUB_STEP_SUMMARY"
        working-directory: frontend/ml-canvas

      - name: Test
        run: bash ../../.github/scripts/run_check.sh "Unit tests (vitest)" npm test
        working-directory: frontend/ml-canvas

      - name: Build
        # Notice: building here compiles the code anyway, but doing it inside
        # frontend-build keeps the gate super fast!
        run: bash ../../.github/scripts/run_check.sh "Build" npm run build
        working-directory: frontend/ml-canvas

      - name: Bundle size budget
        run: bash ../../.github/scripts/run_check.sh "Bundle size budget" npm run size-check
        working-directory: frontend/ml-canvas

  frontend-e2e:
    name: Frontend e2e (Playwright)
    needs: frontend-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/ml-canvas/package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci --silent --no-audit --no-fund
          echo "::endgroup::"
          echo "## 🎭 Frontend e2e (Playwright)" >> "$GITHUB_STEP_SUMMARY"
        working-directory: frontend/ml-canvas

      - name: Install Playwright browsers
        run: |
          echo "::group::npm run test:e2e:install"
          npm run test:e2e:install
          echo "::endgroup::"
        working-directory: frontend/ml-canvas

      - name: Run Playwright e2e tests
        run: bash ../../.github/scripts/run_check.sh "Playwright e2e" npm run test:e2e
        working-directory: frontend/ml-canvas

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/ml-canvas/playwright-report/
          retention-days: 7
