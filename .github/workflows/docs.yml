name: Deploy Docs
on:
  push:
    branches:
      - main
      - master
      - creatingnewversion

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-docs-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-docs-

      - name: Install docs dependencies (uv)
        run: uv pip install --system -r requirements-docs.txt

      # Install skyulf-core so mkdocstrings can import Python modules for API reference
      - name: Install skyulf-core (uv)
        run: uv pip install --system -e ./skyulf-core

      # Build MkDocs documentation
      - run: mkdocs build

      # Create deployment directory with landing page + docs
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp CNAME deploy/
          cp robots.txt deploy/
          cp .gitattributes deploy/
          cp -r static deploy/
          # Rename site/ -> manual/ to avoid GitHub Pages suppressing it
          cp -r site deploy/manual

      # Deploy to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
