# © 2025 Murat Unsal — Skyulf Project

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast Python validation gate: Checks formatting, style, and types before any heavy workloads.
  # If any step here fails, the heavier `test` job never starts.
  python-gate:
    name: Python Static Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies (uv)
        run: |
          uv pip install --system -r requirements-ci.txt

      - name: Lint check (Ruff)
        run: |
          ruff check .

      - name: Format check (Ruff)
        run: |
          ruff format --check backend skyulf-core tests run_fastapi.py run_skyulf.py celery_worker.py

      - name: Type check (Ty)
        run: |
          ty check backend skyulf-core/skyulf skyulf-core/tests run_fastapi.py run_skyulf.py celery_worker.py

  test:
    needs: python-gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ matrix.python-version }}-

      - name: Install dependencies (uv)
        run: |
          uv pip install --system -r requirements-ci.txt

      - name: Complexity gate (lizard, CCN 8)
        run: |
          # Hard gate on green-field / known-clean packages so new code stays simple.
          lizard skyulf-core/skyulf/core skyulf-core/skyulf/engines \
                 skyulf-core/skyulf/preprocessing/scaling \
                 skyulf-core/skyulf/preprocessing/transformations --CCN 8 -w
          # Full-tree report (non-blocking) — surfaces legacy hotspots without failing CI.
          lizard skyulf-core/skyulf --CCN 8 -w || true

      - name: Run tests
        run: pytest -q -s --maxfail=1 --disable-warnings --cov --cov-branch --cov-report=term-missing --cov-report=xml

      - name: Coverage floor (skyulf-core)
        run: |
          # Conservative ratchet floor; raise toward 85% as core-only tests grow.
          pytest skyulf-core/tests -q --cov=skyulf --cov-branch --cov-fail-under=45 --disable-warnings

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  frontend-gate:
    name: Frontend gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ml-canvas/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/ml-canvas

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend/ml-canvas

      - name: Type check (tsc)
        run: npx tsc --project tsconfig.json --noEmit
        working-directory: frontend/ml-canvas

  frontend-build:
    needs: frontend-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/ml-canvas/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/ml-canvas

      - name: Test
        run: npm test
        working-directory: frontend/ml-canvas

      - name: Build
        # Notice: building here compiles the code anyway, but doing it inside
        # frontend-build keeps the gate super fast!
        run: npm run build
        working-directory: frontend/ml-canvas

      - name: Bundle size budget
        run: npm run size-check
        working-directory: frontend/ml-canvas
