name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Monday 06:00 UTC — surfaces newly-published CVEs against pinned
    # dependencies even when no code changes land.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pyscan:
    name: Dependency vulnerability scan (pyscan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install pyscan
        run: uv pip install --system "pyscan-rs>=2.1.3"

      # pyscan reads uv.lock at the repo root and honours .pyscanignore.
      # It exits non-zero when an un-ignored vulnerability is found, failing the gate.
      - name: Scan dependencies (uv.lock vs OSV)
        run: pyscan
