# © 2025 Murat Unsal — Skyulf Project
#
# Publishes skyulf-core to PyPI when a tag matching `core-vX.Y.Z` is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# Release flow:
#   1. Bump the version in skyulf-core/setup.py.
#   2. git tag core-v0.1.17 && git push origin core-v0.1.17

name: Release skyulf-core

on:
  push:
    tags:
      - "core-v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
        working-directory: skyulf-core

      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
        working-directory: skyulf-core

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skyulf-core-dist
          path: skyulf-core/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Required for PyPI Trusted Publishing (OIDC).
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: skyulf-core-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
