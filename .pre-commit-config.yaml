repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # tsconfig*.json files are JSONC (allow comments / trailing commas),
        # which the strict JSON parser can't read. The frontend lint/build
        # validates them instead.
        exclude: (^|/)tsconfig.*\.json$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff          # Lint (replaces flake8 + isort)
        args: [--fix]
      - id: ruff-format    # Format (replaces black)
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        # Mirrors the CI "Type check (ty)" step so type errors are caught on
        # commit, before CI. `uv tool run` fetches/runs ty without needing it
        # installed in the venv or on PATH.
        entry: uv tool run ty check backend skyulf-core/skyulf skyulf-core/tests run_fastapi.py run_skyulf.py celery_worker.py
        language: system
        types: [python]
        pass_filenames: false
      - id: frontend-lint
        name: frontend lint (eslint)
        # Runs the frontend linter. Filters to run only when frontend TS/JSX source files change.
        entry: npm --prefix frontend/ml-canvas run lint
        language: system
        files: ^frontend/ml-canvas/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
